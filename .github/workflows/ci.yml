name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Image
        run: |
          docker build -t 7702473707/lifelink-backend:latest ./backend

      - name: Build Frontend Image
        run: |
          docker build -t 7702473707/lifelink-frontend:latest ./frontend

      - name: Push Backend Image
        run: |
          docker push 7702473707/lifelink-backend:latest

      - name: Push Frontend Image
        run: |
          docker push 7702473707/lifelink-frontend:latest
